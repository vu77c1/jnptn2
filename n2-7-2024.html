        function highlight(text, word, mean) {
            if (!text) return "";
            return text.replace(word, `<span class="highlight" data-mean="${mean}">${word}</span>`);
        }

た。温暖化によって平均気温が上昇していることが大きな原因だそうです。私は、夏が過ぎ
て気温が下がってくれば、必ず紅葉が始まると思っていました。（ 49 ）、そうではありま
せんでした。紅葉には、条件となる気温の変化がありました｡</br>
葉の変色が始まるのは、1日の最低気温が大体8度以下になってからです。秋になっても、最
低気温が一定の気温まで下がらなければ、紅葉は（ 50 ）。その後、さらに寒くなり、5 ~6
度まで下がると、紅葉は一気に進みます。また、5度以下の日が続くと、最も美しい紅葉が見
られるといわれています｡</br>
紅葉に起きている異変を知り、このまま温暖化が進むと、日本の秋の景色が変わってしまう
可能性もあるのではないかと思いました。もしかしたら、紅葉自体が見られなくなる日も来
るかもしれません。紅葉を通して、温暖化が身近な問題であることをより強く（ 51 ）。

                html += `
    <div class="card-q">
      <div class="sentence" data-vi="${q.vi}">
        <span class="number">${number}</span>
        ${highlight(q.sentence, q.word, q.mean)}
      </div>

      <div class="row g-2">
        ${q.options.map((opt, index) => `
          <div class="col-12">
            <label class="option d-flex align-items-center" id="q${i}_${index}">
              <input type="radio" name="q${i}" value="${index}" onchange="checkOne(${i})">
              ${index + 1}. ${opt}
            </label>
          </div>
        `).join("")}
      </div>
    </div>
    `;
            });

            document.getElementById("quiz").innerHTML = html;
        }

        function checkOne(i) {
            let q = data[i];
            let selected = document.querySelector(`input[name="q${i}"]:checked`);

            q.options.forEach((_, index) => {
                document.getElementById(`q${i}_${index}`)
                    .classList.remove("correct", "wrong");
            });

            if (selected) {
                let val = Number(selected.value);

                q.options.forEach((_, index) => {
                    let el = document.getElementById(`q${i}_${index}`);

                    if (index === q.correct) el.classList.add("correct");
                    if (index === val && index !== q.correct) el.classList.add("wrong");
                });
            }
        }

        function check() {
            let wrongCount = 0;
            let unanswered = 0;

            data.forEach((q, i) => {
                let selected = document.querySelector(`input[name="q${i}"]:checked`);
                if (!selected) {
                    unanswered++;
                }

                q.options.forEach((_, index) => {
                    let el = document.getElementById(`q${i}_${index}`);
                    el.classList.remove("correct", "wrong");

                    if (index === q.correct) el.classList.add("correct");
                    if (selected && index === Number(selected.value) && index !== q.correct) el.classList.add("wrong");
                });

                // Tăng số câu sai nếu đã chọn nhưng chọn sai
                if (selected && Number(selected.value) !== q.correct) {
                    wrongCount++;
                }
            });

            // Hiển thị kết quả
            const resultDiv = document.getElementById("result");
            resultDiv.innerHTML = `
        <b>Kết quả:</b> ${wrongCount} câu sai, ${unanswered} câu chưa làm, ${data.length - wrongCount - unanswered} câu đúng.
    `;
        }

        function resetAll() {
            document.querySelectorAll("input").forEach(e => e.checked = false);
            document.querySelectorAll(".option").forEach(e => {
                e.classList.remove("correct", "wrong");
            });
        }

        render();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>

</body>
