            return text.replace(word, `<span class="highlight" data-mean="${mean}">${word}</span>`);
        }

            let currentSection = "";

                    html += `<h5 class="mt-4 mb-3">${q.section}</h5>`;

      html += `
      <div id="reading9" class="reading">
      <b>目で味わう</b><br><br>
      「目で味わう」という言葉があります。もちろん、目で食べ物を食べるという意味ではあり
ません。食べる前に目で見て料理の見た目を楽しむという意味です｡
しかし、「味わう」という言葉は普通、舌で料理の味を楽しむことを指します。目でも味を
感じることはできるのでしょうか。色使いや盛り方など、料理の見た目がきれいだと食事の

いしそうに感じられます。 では、単に料理を見ておいしそうだと思うことを「味わう」と表
現しているのでしょうか｡
（ 49 ）近年、料理の見た目が影響するのは食べる前だけではないことがわかってきました。
ある研究で、食べ物の味は変えずに、色や器の種類などを変えて提供し、それぞれどんな味
か評価させる実験が行われました。すると、全く同じ味のものを食べたにもかかわらず、味
が異なると評価した人が多かったそうです。目から入る情報は、食べたときの味の感じ方
（ 50 ）影響していたのです。このように科学的にも、実際に目で味わっているということ
が証明されつつあります。味を感じる仕組みは複雑で、見た目も大切な要素の一つです。そ

        function checkOne(i) {
            let q = data[i];
            let selected = document.querySelector(`input[name="q${i}"]:checked`);

            q.options.forEach((_, index) => {
                document.getElementById(`q${i}_${index}`)
                    .classList.remove("correct", "wrong");
            });

            if (selected) {
                let val = Number(selected.value);

                q.options.forEach((_, index) => {
                    let el = document.getElementById(`q${i}_${index}`);

                    if (index === q.correct) el.classList.add("correct");
                    if (index === val && index !== q.correct) el.classList.add("wrong");
                });
            }
        }

        function check() {
    let wrongCount = 0;
    let unanswered = 0;

    data.forEach((q, i) => {
        let selected = document.querySelector(`input[name="q${i}"]:checked`);
        if (!selected) {
            unanswered++;
        }

        q.options.forEach((_, index) => {
            let el = document.getElementById(`q${i}_${index}`);
            el.classList.remove("correct", "wrong");

            if (index === q.correct) el.classList.add("correct");
            if (selected && index === Number(selected.value) && index !== q.correct) el.classList.add("wrong");
        });

        // Tăng số câu sai nếu đã chọn nhưng chọn sai
        if (selected && Number(selected.value) !== q.correct) {
            wrongCount++;
        }
    });

    // Hiển thị kết quả
    const resultDiv = document.getElementById("result");
    resultDiv.innerHTML = `
        <b>Kết quả:</b> ${wrongCount} câu sai, ${unanswered} câu chưa làm, ${data.length - wrongCount - unanswered} câu đúng.
    `;
}

            document.querySelectorAll(".option").forEach(e => {
