/* number */
.number{

  padding:18px;
  margin-bottom:20px;

/* option */
.option{
  cursor:pointer;
  padding:14px;
  border-radius:10px;
  border:1px solid #ddd;
  transition:0.2s;
  font-size:18px;
}

.option:hover{

}

.option input{

/* result */
.correct{

  border-color:green;
  color:green;
  font-weight:bold;
}

.wrong{
  background:#fdeaea;
  border-color:red;

}

/* highlight */
.highlight{
  border-bottom:2px solid #333;
  font-weight:bold;
  position:relative;
}

.highlight:hover::after{
  content:attr(data-mean);
  position:absolute;
  top:-35px;
  left:0;
  background:#000;
  color:#fff;
  padding:4px 8px;
  font-size:12px;
  border-radius:5px;
  white-space:nowrap;
}

/* sentence */
.sentence{

.sentence:hover::after{

// ===== FUNCTIONS =====

function highlight(text, word, mean){
  if(!text) return "";
  return text.replace(word, `<span class="highlight" data-mean="${mean}">${word}</span>`);
}

function render(){
  let html = "";
  let currentSection = "";

  data.forEach((q,i)=>{
    let number = i+1;

    if(q.section && q.section !== currentSection){
      currentSection = q.section;
      html += `<h5 class="mt-4 mb-3">${q.section}</h5>`;
    }

    // reading 問題9
    if(q.section && q.section.includes("問題9") && !html.includes("reading9")){
      html += `
      <div id="reading9" class="reading">
      <b>以下は、留学生の作文である。</b><br><br>
      
            <b>高齢者外出支援</b><br><br>
                  <b>フク ヒョンミ</b><br><br>
      現在、日本では65歳以上の高齢者が人口の約3割に達するほど高齢化が進んでいる。そんな
日本で今、高齢者の体と心の健康のために外出を支援するサービスの重要性が増しているそ
うだ。このサービスには、どのような効果があるのだろうか｡
外出を支援するサービスは、大きく分けて二つある。まず一つ目は、移動をサポートする
サービスで、主に車での送迎サービスだ、車の運転が困難な人や、最寄りのバス停や駅まで
歩くことが負担になる人に（ 48 ）。二つ目は、外出の機会を提供するサービスだ。用事が
ないから外出しないという高齢者は（ 49 ）。そのため、商店街での割引を実施したり、集
まっておしゃべりができる会を開いたりするなど、外出の目的や場所を提供している。これ
らのサービスにより、外出の回数が増えたという人も多いそうだ｡
外出回数は、高齢者の体と心の健康に大きく影響する。（ 50 ）調査では、歩行に障害が出
た人の数は、外出回数が1日1回以上の人より3日に1回未満の人のほうが約4倍も多かった。
また、外出は心の健康のために欠かせないという研究報告もある。外出によって脳に刺激を
与えることは、脳の機能が低下するのを防ぎ、心の健康につながるのだそうだ｡
外出と健康の関係を考えると、高齢者が外出することには大きな意味がある。高齢化が進む
日本（ 51 ）、外出支援サービスは重要な役割を果たしているのだ｡
      </div>`;
    }

    html += `
    <div class="card-q">
      <div class="sentence" data-vi="${q.vi}">
        <span class="number">${number}</span>
        ${highlight(q.sentence, q.word, q.mean)}
      </div>

      <div class="row g-2">
        ${q.options.map((opt,index)=>`
          <div class="col-12">
            <label class="option d-flex align-items-center" id="q${i}_${index}">
              <input type="radio" name="q${i}" value="${index}" onchange="checkOne(${i})">
              ${index+1}. ${opt}
            </label>
          </div>
        `).join("")}
      </div>
    </div>
    `;
  });

  document.getElementById("quiz").innerHTML = html;
}

function checkOne(i){
  let q = data[i];
  let selected = document.querySelector(`input[name="q${i}"]:checked`);

  q.options.forEach((_,index)=>{
    document.getElementById(`q${i}_${index}`)
      .classList.remove("correct","wrong");
  });

  if(selected){
    let val = Number(selected.value);

    q.options.forEach((_,index)=>{
      let el = document.getElementById(`q${i}_${index}`);

      if(index === q.correct) el.classList.add("correct");
      if(index === val && index !== q.correct) el.classList.add("wrong");
    });
  }
}

function check(){
  data.forEach((q,i)=>{
    let selected = document.querySelector(`input[name="q${i}"]:checked`);

    q.options.forEach((_,index)=>{
      document.getElementById(`q${i}_${index}`)
        .classList.remove("correct","wrong");
    });

    if(selected){
      let val = Number(selected.value);

      q.options.forEach((_,index)=>{
        let el = document.getElementById(`q${i}_${index}`);

        if(index === q.correct) el.classList.add("correct");
        if(index === val && index !== q.correct) el.classList.add("wrong");
      });
    }
  });
}

function resetAll(){
  document.querySelectorAll("input").forEach(e=>e.checked=false);
  document.querySelectorAll(".option").forEach(e=>{
    e.classList.remove("correct","wrong");
  });
}

render();
